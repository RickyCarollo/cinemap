  <!-- perforations top -->
  <rect x="30" y="22" width="52" height="38" rx="7" fill="#c8a96e"/>
  <rect x="110" y="22" width="52" height="38" rx="7" fill="#c8a96e"/>
  <rect x="190" y="22" width="52" height="38" rx="7" fill="#c8a96e"/>

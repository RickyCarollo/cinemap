  <rect x="430" y="22" width="52" height="38" rx="7" fill="#c8a96e"/>
  <!-- perforations bottom -->
  <rect x="30" y="452" width="52" height="38" rx="7" fill="#c8a96e"/>
  <rect x="110" y="452" width="52" height="38" rx="7" fill="#c8a96e"/>
  <rect x="190" y="452" width="52" height="38" rx="7" fill="#c8a96e"/>
